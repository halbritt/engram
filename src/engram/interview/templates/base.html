{% extends "_app_shell.html" %}

{% block title %}Engram interview{% endblock %}

{% block head_extra %}
  <script src="/static/htmx.min.js" defer></script>
  <style>
    h1 {
      font-size: var(--type-display);
      line-height: 1.25;
      margin: 0;
    }
    h2 {
      font-size: var(--type-heading);
      line-height: 1.3;
      margin: 0;
    }
    h3 {
      font-size: var(--type-subheading);
      line-height: 1.3;
      margin: var(--space-4) 0 var(--space-2);
    }
    .surface-main,
    #main {
      width: min(880px, calc(100vw - 32px));
      display: grid;
      align-content: start;
      gap: var(--space-4);
    }
    section {
      display: grid;
      gap: var(--space-3);
    }
    .session-list {
      display: grid;
      gap: var(--space-2);
      padding-left: var(--space-5);
    }
    .session-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }
    .inline-form {
      display: inline;
    }
    .new-session-form {
      display: grid;
      grid-template-columns: auto minmax(5rem, 8rem) auto minmax(8rem, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
    }
    .button-link {
      border-color: var(--color-border);
      background: var(--color-surface-muted);
    }
    .danger-action {
      color: var(--color-danger);
      border-color: var(--color-danger);
    }
    .verdict-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .verdict-row button {
      min-width: 9rem;
    }
    /* Verdict differentiation: icon + underline + color (no color-only). */
    .v-true {
      color: var(--color-ok);
      text-decoration: underline solid var(--color-ok) 2px;
    }
    .v-false {
      color: var(--color-danger);
      text-decoration: underline solid var(--color-danger) 2px;
    }
    .v-stale {
      color: var(--color-warn);
      text-decoration: underline dotted var(--color-warn) 2px;
    }
    .v-unsupported {
      color: var(--color-warn);
      text-decoration: underline dashed var(--color-warn) 2px;
    }
    .v-unsure {
      color: var(--color-fg-muted);
      text-decoration: underline dotted var(--color-fg-muted) 2px;
    }
    .v-skip {
      color: var(--color-fg-muted);
      text-decoration: underline dashed var(--color-fg-muted) 2px;
    }
    .icon {
      font-style: normal;
      margin-right: var(--space-1);
    }
    .evidence-row {
      padding: var(--space-3);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-left: 3px solid var(--color-border-strong);
      border-radius: 4px;
      display: grid;
      gap: var(--space-2);
    }
    .evidence-row header {
      color: var(--color-fg-muted);
      font-size: var(--type-meta);
    }
    .evidence-row pre {
      white-space: pre-wrap;
      margin: 0;
    }
    .evidence-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .evidence-actions a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    .banner-warn {
      padding: var(--space-2) var(--space-3);
    }
    .advisory-line,
    .version-triple,
    .evidence-dates,
    #status-line {
      font-size: var(--type-meta);
    }
    .summary-line {
      display: grid;
      gap: var(--space-2);
      white-space: pre-wrap;
    }
    .summary-triple {
      font-weight: 600;
    }
    .predicate-intent {
      color: var(--color-fg-muted);
    }
    .strata-strip {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: var(--type-meta);
      color: var(--color-fg-muted);
    }
    kbd {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      background: var(--color-accent-soft);
      padding: 1px 5px;
      border: 1px solid var(--color-border);
      border-radius: 3px;
    }
    sup.accesskey {
      color: var(--color-accent);
      font-weight: bold;
      margin-left: var(--space-1);
    }
    @media (max-width: 720px) {
      .new-session-form {
        grid-template-columns: 1fr;
        align-items: stretch;
      }
    }
    @media (max-width: 640px) {
      .surface-main,
      #main {
        width: min(100vw - 24px, 880px);
        padding-top: var(--space-4);
        padding-bottom: var(--space-4);
      }
      .verdict-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .verdict-row button {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
{% endblock %}

{% block main %}
  {% block interview_main %}{% endblock %}
{% endblock %}

{% block body_extra %}
  <script>
    (function () {
      document.body.addEventListener('htmx:beforeRequest', function (ev) {
        var form = ev.target.closest && ev.target.closest('form');
        if (!form) return;
        form.setAttribute('aria-busy', 'true');
        form.querySelectorAll('button').forEach(function (button) {
          button.disabled = true;
        });
      });
      document.body.addEventListener('htmx:afterRequest', function (ev) {
        var form = ev.target.closest && ev.target.closest('form');
        if (!form) return;
        form.removeAttribute('aria-busy');
        form.querySelectorAll('button').forEach(function (button) {
          button.disabled = false;
        });
      });
    })();
  </script>
{% endblock %}
