<nav class="surface-tabs" aria-label="Operator surfaces">
  <a class="surface-tab{% if surface == 'interview' %} is-active{% endif %}"
     href="{{ interview_url|default('/') }}">Interview</a>
  <a class="surface-tab{% if surface == 'bench' %} is-active{% endif %}"
     href="{{ bench_url|default('/segments?remaining=1&reviewable=1') }}">Bench review</a>
  <span class="surface-tab is-disabled"
        role="link"
        aria-disabled="true"
        data-future="true"
        title="Phase 4: not yet built">Entities (future)</span>
</nav>
