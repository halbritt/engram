<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Engram {{ surface_label|default("operator") }}{% endblock %}</title>
    <style>
      :root {
        --color-surface: #ffffff;
        --color-surface-muted: #f3f5f4;
        --color-surface-sunken: #e9ecea;
        --color-border: #d4dad6;
        --color-border-strong: #9aa19c;
        --color-fg: #16201c;
        --color-fg-muted: #5a615c;
        --color-accent: #0f6e69;
        --color-accent-soft: #dff1ee;
        --color-ok: #13733e;
        --color-ok-strong: #13733e;
        --color-ok-soft: #e2f2e8;
        --color-warn: #8a5b00;
        --color-warn-soft: #fbf1d8;
        --color-warn-muted: #bda369;
        --color-danger: #a8341c;
        --color-danger-soft: #fbe6e0;
        --color-info: #395e8f;
        --color-info-muted: #587596;
        --color-info-soft: #e3ebf6;
        --color-focus: #0f6e69;
        --type-display: 22px;
        --type-heading: 18px;
        --type-subheading: 15px;
        --type-body: 15px;
        --type-meta: 13px;
        --type-mono: 13px;
        --space-0: 0;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 48px;
        --space-8: 64px;
      }

      * { box-sizing: border-box; }
      html { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: var(--color-surface);
        color: var(--color-fg);
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        font-size: var(--type-body);
        line-height: 1.45;
      }
      a, a:visited { color: var(--color-accent); }
      code, pre, kbd {
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: var(--type-mono);
      }
      button, input, textarea, select { font: inherit; }
      button, .button {
        min-height: 36px;
        border: 1px solid var(--color-border-strong);
        border-radius: 6px;
        background: var(--color-surface);
        color: var(--color-fg);
        padding: var(--space-2) var(--space-3);
        cursor: pointer;
      }
      button:focus-visible,
      a:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--color-focus);
        outline-offset: 2px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      input, textarea, select {
        border: 1px solid var(--color-border);
        border-radius: 6px;
        background: var(--color-surface);
        padding: var(--space-2);
      }
      textarea {
        width: 100%;
        min-height: 92px;
      }
      .app-header {
        display: grid;
        gap: var(--space-2);
        border-bottom: 1px solid var(--color-border);
        background: var(--color-surface);
      }
      .app-header-row,
      .surface-main,
      .audit-footer {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
      }
      .app-header-row {
        min-height: 40px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: var(--space-3);
        align-items: center;
        padding-top: var(--space-2);
      }
      .brand-line {
        display: flex;
        gap: var(--space-2);
        align-items: baseline;
        min-width: 0;
      }
      .brand-mark {
        display: inline-block;
        width: 4px;
        height: 1.35em;
        background: var(--color-accent);
      }
      .brand-name { font-weight: 600; }
      .surface-label { color: var(--color-fg-muted); }
      .header-actions {
        display: flex;
        gap: var(--space-2);
      }
      .icon-button {
        min-width: 36px;
        padding-inline: var(--space-2);
      }
      .surface-tabs {
        min-height: 36px;
        display: flex;
        gap: var(--space-4);
        align-items: end;
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        overflow-x: auto;
      }
      .surface-tab {
        color: var(--color-fg-muted);
        text-decoration: none;
        padding: var(--space-2) 0;
        border-bottom: 3px solid transparent;
        white-space: nowrap;
      }
      .surface-tab.is-active {
        color: var(--color-accent);
        border-bottom-color: var(--color-accent);
      }
      .surface-tab.is-disabled {
        cursor: not-allowed;
        color: var(--color-fg-muted);
      }
      .surface-main {
        padding: var(--space-5) 0;
      }
      .stack { display: grid; gap: var(--space-3); }
      .muted { color: var(--color-fg-muted); }
      .banner {
        border-left: 4px solid var(--color-info);
        background: var(--color-info-soft);
        padding: var(--space-3);
      }
      .banner-info { border-left-color: var(--color-info); background: var(--color-info-soft); }
      .banner-warn { border-left-color: var(--color-warn); background: var(--color-warn-soft); }
      .banner-danger,
      .banner-error { border-left-color: var(--color-danger); background: var(--color-danger-soft); }
      .banner-ok { border-left-color: var(--color-ok); background: var(--color-ok-soft); }
      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: var(--space-1);
        min-height: 24px;
        padding: 1px var(--space-2);
        border: 1px solid var(--color-border);
        border-radius: 999px;
        color: var(--chip-color, var(--color-fg-muted));
        background: var(--color-surface-muted);
        font-size: var(--type-meta);
        white-space: nowrap;
      }
      .status-chip[data-status="accepted"] { --chip-color: var(--color-ok-strong); }
      .status-chip[data-status="candidate"],
      .status-chip[data-status="advisory"] { --chip-color: var(--color-info); }
      .status-chip[data-status="blocked"],
      .status-chip[data-status="failed"] { --chip-color: var(--color-danger); }
      .status-chip[data-status="stale"] { --chip-color: var(--color-warn); }
      .status-chip[data-status="unsupported"],
      .status-chip[data-status="proposed"] { --chip-color: var(--color-warn-muted); }
      .status-chip[data-status="redacted"] {
        background: repeating-linear-gradient(
          45deg,
          var(--color-surface-muted),
          var(--color-surface-muted) 4px,
          var(--color-surface-sunken) 4px,
          var(--color-surface-sunken) 8px
        );
      }
      .future-slot {
        display: grid;
        gap: var(--space-2);
        border: 1px dashed var(--color-border-strong);
        background: var(--color-surface-sunken);
        padding: var(--space-4);
      }
      .cli-command-card {
        display: grid;
        gap: var(--space-2);
        border: 1px solid var(--color-border);
        background: var(--color-surface-muted);
        padding: var(--space-3);
      }
      .cli-command-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: var(--space-2);
        align-items: center;
      }
      .audit-footer {
        display: flex;
        justify-content: space-between;
        gap: var(--space-3);
        align-items: center;
        min-height: 28px;
        color: var(--color-fg-muted);
        font-size: var(--type-meta);
        border-top: 1px solid var(--color-border);
      }
      .visually-hidden {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
      }
      #help-modal {
        position: fixed;
        inset: 10vh auto auto 50%;
        transform: translateX(-50%);
        width: min(48rem, calc(100vw - 32px));
        max-height: 80vh;
        overflow: auto;
        background: var(--color-surface);
        border: 1px solid var(--color-border-strong);
        padding: var(--space-4);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        z-index: 100;
      }
      #help-modal table {
        width: 100%;
        border-collapse: collapse;
      }
      #help-modal th,
      #help-modal td {
        border-bottom: 1px solid var(--color-border);
        padding: var(--space-2);
        text-align: left;
      }
      @media (max-width: 900px) {
        .surface-tabs { gap: var(--space-3); }
        .app-header-row { grid-template-columns: 1fr; }
        .audit-footer { flex-direction: column; align-items: flex-start; padding: var(--space-2) 0; }
      }
      @media (max-width: 480px) {
        #help-modal {
          inset: 0;
          transform: none;
          width: 100vw;
          max-height: 100vh;
          border: 0;
        }
      }
    </style>
    {% block head_extra %}{% endblock %}
    <script src="{{ keyboard_static_url|default('/static/keyboard.js') }}" defer></script>
  </head>
  <body>
    <div id="live-region" aria-live="polite" class="visually-hidden"></div>
    <header class="app-header">
      <div class="app-header-row">
        <div class="brand-line">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">Engram local</span>
          <span aria-hidden="true">·</span>
          <span class="surface-label">{{ surface_label|default("Operator") }}</span>
        </div>
        <div class="header-actions">
          <button type="button" class="icon-button" data-help-open data-key="?"
                  aria-label="Open help">?</button>
        </div>
      </div>
      {% include "_surface_tabs.html" %}
    </header>
    <main id="main" class="surface-main">
      {% block main %}{% endblock %}
    </main>
    {% include "_audit_footer.html" %}
    {% include "_help_modal.html" %}
    {% block body_extra %}{% endblock %}
  </body>
</html>
