services:
  db:
    image: pgvector/pgvector:pg17
    container_name: engram-postgres
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    ports:
      - "127.0.0.1:${ENGRAM_POSTGRES_PORT:-54329}:5432"
    volumes:
      - engram-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  engram-postgres-data:
